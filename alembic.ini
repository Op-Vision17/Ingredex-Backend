# Alembic configuration — see https://alembic.sqlalchemy.org/

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Overridden at runtime in env.py from DATABASE_URL (or Settings) — not used as-is.
# Online migrations use asyncpg; offline uses sync URL derived from the same value.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
